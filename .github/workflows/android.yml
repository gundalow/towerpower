name: Android CI/CD

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request_target' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Create/Update Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.event_name == 'push' && format('v1.0.{0}', github.run_number) || format('pr-{0}', github.event.pull_request.number) }}"
          name: "${{ github.event_name == 'push' && format('Release v1.0.{0}', github.run_number) || format('Build for PR #{0}', github.event.pull_request.number) }}"
          prerelease: "${{ github.event_name == 'pull_request_target' }}"
          generate_release_notes: "${{ github.event_name == 'push' }}"
          make_latest: "${{ github.event_name == 'push' }}"
          draft: true
          files: app/build/outputs/apk/release/app-release.apk

      - name: Publish Release
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.create_release.outputs.id }},
              draft: false
            })

      - name: Comment PR with Download Link
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/pr-${context.payload.pull_request.number}/app-release.apk`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Build Successful! 🚀\n\n[Download APK](${url})\n\n*Note: This link will be removed when the PR is closed.*`
            })

  cleanup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete PR Release and Tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `pr-${context.payload.pull_request.number}`;
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ ...context.repo, tag });
              await github.rest.repos.deleteRelease({ ...context.repo, release_id: release.id });
            } catch (e) {}
            try {
              await github.rest.git.deleteRef({ ...context.repo, ref: `tags/${tag}` });
            } catch (e) {}
